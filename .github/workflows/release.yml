name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      release_id: ${{ steps.release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "EM Station $TAG" \
            --generate-notes \
            --draft
          echo "id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" --jq .id)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-2025
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/station/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        working-directory: apps/station
        run: npm ci

      - name: Verify workspace
        run: cargo test --workspace

      - name: Build agent
        run: cargo build --release --target ${{ matrix.target }} -p em-agent

      - name: Package Linux agent
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-agent
          cp "target/${{ matrix.target }}/release/em-agent" release-agent/
          cp -R packaging/linux release-agent/
          tar -C release-agent -czf "em-agent-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" .

      - name: Package Windows agent
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-agent | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/em-agent.exe" release-agent/
          Copy-Item -Recurse packaging/windows release-agent/
          Compress-Archive -Path release-agent/* -DestinationPath "em-agent-${env:GITHUB_REF_NAME}-windows-x86_64.zip"

      - name: Upload agent package
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ASSET="em-agent-${TAG}-windows-x86_64.zip"
          else
            ASSET="em-agent-${TAG}-linux-x86_64.tar.gz"
          fi
          gh release upload "$TAG" "$ASSET" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/station
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          args: --target ${{ matrix.target }}

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
